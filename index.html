<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Mangalya - Shop Management</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9b0026">
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f3f4f6;
            --card: #ffffff;
            --dark: #1f2937;
            --brand-red: #9b0026;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        .nav-bar { background: var(--brand-red); padding: 10px 0; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: white; color: var(--brand-red); }
        .container { max-width: 1350px; margin: 20px auto; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        h2 { text-align: center; color: var(--dark); margin-bottom: 10px; }
        .save-status { text-align: center; color: var(--success); font-size: 12px; height: 20px; font-weight: bold; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; background: #e5e7eb; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: center; }
        th { background-color: var(--brand-red); color: white; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-sync { background: #4285F4; width: 100%; padding: 12px; margin-top: 10px; font-size: 14px; }
        .btn-wa { background: #25D366; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-btn { width: 18px; height: 18px; font-size: 8px; background: var(--danger); color: white; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .day-btn.present { background: var(--success); }
        .a-day { background: white; color: #333; border: 1px solid #ddd; }
        .has-advance { background: var(--warning); color: white; }
    </style>
</head>
<body>

<div class="nav-bar">
    <button class="nav-btn active" onclick="showView('attendance')">Staff Attendance</button>
    <button class="nav-btn" onclick="showView('competition')">Leggings Competition</button>
</div>

<div class="container">
    <div class="controls">
        <select id="month" onchange="onMonthYearChange()">
            <option value="1">January</option><option value="2">February</option><option value="3">March</option>
            <option value="4" selected>April</option><option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option><option value="9">September</option>
            <option value="10">October</option><option value="11">November</option><option value="12">December</option>
        </select>
        <input type="number" id="year" value="2026" onchange="onMonthYearChange()" style="width:70px">
    </div>

    <div id="attendance" class="view-section active">
        <h2>Payroll & Attendance</h2>
        <div id="attSaveStatus" class="save-status"></div>
        <table>
            <thead>
                <tr>
                    <th>Name</th><th>Base</th><th>Attendance</th><th>Advance</th><th>Bill</th><th>Bonus</th><th>Net</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="employeeTable"></tbody>
        </table>
        <button class="btn btn-sync" onclick="syncAllToSheets()">☁ Backup All Data to Google Sheets</button>
    </div>

    <div id="competition" class="view-section">
        <h2>Leggings Sales</h2>
        <div id="compSaveStatus" class="save-status"></div>
        <table id="compTable">
            <thead><tr><th>Name</th><th>Sold</th><th>Points</th><th>Action</th></tr></thead>
            <tbody id="compBody"></tbody>
        </table>
        <button class="btn btn-sync" style="background:#25D366" onclick="shareCompWhatsApp()">📲 Share on WhatsApp</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "PASTE_YOUR_WEB_APP_URL_HERE"; // <--- CHANGE THIS URL
    const fixedStaff = ["AMBIKA", "ABIRAMI", "BANU", "SOWMIYA"];

    function showView(viewId) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function onMonthYearChange() { loadAttData(); }

    function addEmployeeRow(name, base=0, present=[], advances={}, bill=0, bonus=0) {
        let total = new Date(document.getElementById("year").value, document.getElementById("month").value, 0).getDate();
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><input type="text" value="${name}" class="name-in" style="width:80px"></td>
            <td><input type="number" value="${base}" class="base-in" oninput="calc()" style="width:60px"></td>
            <td><div class="calendar-grid p-grid"></div></td>
            <td><div class="calendar-grid a-grid"></div></td>
            <td><input type="number" value="${bill}" class="bill-in" oninput="calc()" style="width:50px"></td>
            <td><input type="number" value="${bonus}" class="bonus-in" oninput="calc()" style="width:50px"></td>
            <td><span class="net-val">0</span></td>
            <td><button onclick="sendAttWhatsApp(this)" style="background:#25D366; color:white; border:none; border-radius:4px; padding:4px;">WA</button></td>
        `;
        document.getElementById("employeeTable").appendChild(row);
        
        const pg = row.querySelector(".p-grid");
        const ag = row.querySelector(".a-grid");
        for(let i=1; i<=total; i++) {
            let pb = document.createElement("div"); pb.className = "day-btn " + (present.includes(i) ? "present" : ""); pb.innerText = i;
            pb.onclick = () => { pb.classList.toggle("present"); calc(); };
            pg.appendChild(pb);

            let ab = document.createElement("div"); ab.className = "day-btn a-day " + (advances[i] ? "has-advance" : ""); ab.innerText = i;
            ab.dataset.amt = advances[i] || 0;
            ab.onclick = () => { let v = prompt("Advance:", ab.dataset.amt); if(v!==null){ ab.dataset.amt=v; calc(); }};
            ag.appendChild(ab);
        }
        calc();
    }

    function calc() {
        let m = document.getElementById("month").value, y = document.getElementById("year").value;
        let days = new Date(y, m, 0).getDate();
        let allData = [];
        document.querySelectorAll("#employeeTable tr").forEach(row => {
            let n = row.querySelector(".name-in").value, b = parseFloat(row.querySelector(".base-in").value)||0;
            let p = row.querySelectorAll(".p-grid .present").length;
            let adv = 0; row.querySelectorAll(".a-day").forEach(d => adv += parseFloat(d.dataset.amt)||0);
            let bill = parseFloat(row.querySelector(".bill-in").value)||0, bonus = parseFloat(row.querySelector(".bonus-in").value)||0;
            let net = ((b/days)*p) - adv - bill + bonus;
            row.querySelector(".net-val").innerText = net.toFixed(0);
            
            // Collect for storage
            let pDays = []; row.querySelectorAll(".p-grid .day-btn").forEach((btn, i) => { if(btn.classList.contains("present")) pDays.push(i+1); });
            let advs = {}; row.querySelectorAll(".a-day").forEach((btn, i) => { if(btn.dataset.amt > 0) advs[i+1] = btn.dataset.amt; });
            allData.push({name:n, base:b, bill:bill, bonus:bonus, pDays, advs});
        });
        localStorage.setItem(`att_${y}_${m}`, JSON.stringify(allData));
    }

    function loadAttData() {
        let m = document.getElementById("month").value, y = document.getElementById("year").value;
        let saved = localStorage.getItem(`att_${y}_${m}`);
        document.getElementById("employeeTable").innerHTML = "";
        if(saved) JSON.parse(saved).forEach(e => addEmployeeRow(e.name, e.base, e.pDays, e.advs, e.bill, e.bonus));
        else fixedStaff.forEach(n => addEmployeeRow(n));
    }

    async function syncAllToSheets() {
        const btn = document.querySelector(".btn-sync");
        btn.innerText = "⏳ Syncing...";
        let m = document.getElementById("month").value, y = document.getElementById("year").value;
        
        document.querySelectorAll("#employeeTable tr").forEach(async row => {
            let data = {
                name: row.querySelector(".name-in").value,
                base: row.querySelector(".base-in").value,
                net: row.querySelector(".net-val").innerText,
                date: `${m}/${y}`,
                type: "Salary"
            };
            await fetch(SCRIPT_URL + "?" + new URLSearchParams(data), { method: 'POST', mode: 'no-cors' });
        });
        
        btn.innerText = "✅ Done! Check Google Sheets";
        setTimeout(() => btn.innerText = "☁ Backup All Data to Google Sheets", 3000);
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    loadAttData();
</script>
</body>
</html>
